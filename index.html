<!DOCTYPE html>
<html>
<head>
    <title>Boston Uber Price Estimator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e1e2f, #4b3f72);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin: 20px 0 5px 0;
            font-size: 26px;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 24px;
            color: #d6d6d6;
        }

        .container {
            background: white;
            color: black;
            padding: 24px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            text-align: left;
            margin-top: 14px;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 15px;
        }

        select,
        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #cfcfcf;
            font-size: 16px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .estimate-btn {
            background: #6a5acd;
            color: white;
        }

        .reset-btn {
            background: #d9d9d9;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .card {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 15px;
        }

        .tip {
            background: #e6f0ff;
            border-left: 5px solid #4a90e2;
        }

        @media (max-width: 480px) {
            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<h1>Uber Price & Demand Estimator</h1>
<div class="subtitle">Boston, Massachusetts</div>

<div class="container">

    <label>Day of Week</label>
    <select id="day">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
        <option value="5">Saturday</option>
        <option value="6">Sunday</option>
    </select>

    <label>Hour</label>
    <select id="hour">
        <script>
            for (let i = 0; i < 24; i++) {
                let label;
                if (i === 0) label = "12 AM";
                else if (i < 12) label = i + " AM";
                else if (i === 12) label = "12 PM";
                else label = (i - 12) + " PM";

                document.write(`<option value="${i}">${label}</option>`);
            }
        </script>
    </select>

    <label>Distance (miles)</label>
    <input id="distance" type="number" value="3" min="0" step="0.1" />

    <div class="button-row">
        <button class="estimate-btn" onclick="estimateRide()">Estimate</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <div class="result" id="result"></div>

</div>

<script>
function estimateRide() {
    const day = parseInt(document.getElementById("day").value);
    const hour = parseInt(document.getElementById("hour").value);
    const distance = parseFloat(document.getElementById("distance").value);

    if (isNaN(distance) || distance <= 0) {
        document.getElementById("result").innerHTML =
            `<div class="card"><b>Please enter a valid distance.</b></div>`;
        return;
    }

    const isWeekend = day >= 5 ? 1 : 0;

    let base_price = 2.5 + (2.2 * distance);

    let demand = "Moderate";
    let wait = "3-5 minutes";

    if ((day <= 4 && ((hour >= 7 && hour <= 9) || (hour >= 16 && hour <= 18))) ||
        (day >= 4 && hour >= 20)) {
        demand = "High";
        wait = "6-10+ minutes";
    }

    if (hour <= 6 || hour >= 23) {
        demand = "Low";
        wait = "1-2 minutes";
    }

    let surge = 1.0;

    if (day >= 4 && hour >= 20) surge = 1.5;
    if (day >= 4 && hour >= 23) surge = 2.0;
    else if (day <= 4 && ((hour >= 7 && hour <= 9) || (hour >= 16 && hour <= 18))) surge = 1.2;
    else if (day === 6 && hour >= 17 && hour <= 21) surge = 1.3;

    let final_price = base_price * surge;

    let speed = 22;
    if (hour >= 7 && hour <= 9) speed = 15;
    else if (hour >= 16 && hour <= 18) speed = 15;
    else if (hour >= 22 || hour <= 5) speed = 30;

    if (isWeekend) speed += 3;

    let trip_time = Math.round((distance / speed) * 60);

    // ===== FIXED SMART TIP (REALISTIC WINDOW) =====
    let bestHour = hour;
    let bestCost = final_price;

    let start = Math.max(0, hour - 2);
    let end = Math.min(23, hour + 2);

    for (let h = start; h <= end; h++) {

        let testSurge = 1.0;

        if (day >= 4 && h >= 20) testSurge = 1.5;
        if (day >= 4 && h >= 23) testSurge = 2.0;
        else if (day <= 4 && ((h >= 7 && h <= 9) || (h >= 16 && h <= 18))) testSurge = 1.2;
        else if (day === 6 && h >= 17 && h <= 21) testSurge = 1.3;

        let testPrice = (2.5 + (2.2 * distance)) * testSurge;

        if (testPrice < bestCost) {
            bestCost = testPrice;
            bestHour = h;
        }
    }

    let tipHTML = "";

    if (bestHour !== hour && (final_price - bestCost) > 2) {
        let label;
        if (bestHour === 0) label = "12 AM";
        else if (bestHour < 12) label = bestHour + " AM";
        else if (bestHour === 12) label = "12 PM";
        else label = (bestHour - 12) + " PM";

        tipHTML = `<div class="card tip">💡 <b>Tip:</b> Try riding at <b>${label}</b> to save about $${(final_price - bestCost).toFixed(2)}</div>`;
    }

    document.getElementById("result").innerHTML = `
        <div class="card">💰 Base Price: $${base_price.toFixed(2)}</div>
        <div class="card">⚡ Surge: ${surge}x</div>
        <div class="card">💵 Final Price: $${final_price.toFixed(2)}</div>
        <div class="card">📊 Demand: ${demand}</div>
        <div class="card">⏱ Wait Time: ${wait}</div>
        <div class="card">🚗 Trip Time: ${trip_time} min</div>
        ${tipHTML}
    `;
}

function resetForm() {
    document.getElementById("day").value = "0";
    document.getElementById("hour").value = "0";
    document.getElementById("distance").value = "3";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
