<!DOCTYPE html>
<html>
<head>
    <title>Boston Uber Price Estimator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e1e2f, #4b3f72);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin: 20px 0 5px 0; font-size: 26px; }

        .subtitle {
            font-size: 14px;
            margin-bottom: 24px;
            color: #d6d6d6;
        }

        .container {
            background: white;
            color: black;
            padding: 24px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            text-align: left;
            margin-top: 14px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #cfcfcf;
            font-size: 16px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .estimate-btn { background: #6a5acd; color: white; }
        .reset-btn { background: #d9d9d9; }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .card {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .tip {
            background: #e6f0ff;
            border-left: 5px solid #4a90e2;
        }

        @media (max-width: 480px) {
            .button-row { flex-direction: column; }
        }
    </style>
</head>

<body>

<h1>Uber Price & Demand Estimator</h1>
<div class="subtitle">Boston, Massachusetts</div>

<div class="container">

    <label>Day of Week</label>
    <select id="day">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
        <option value="5">Saturday</option>
        <option value="6">Sunday</option>
    </select>

    <label>Hour</label>
    <select id="hour">
        <script>
            for (let i = 0; i < 24; i++) {
                let label = i === 0 ? "12 AM" :
                            i < 12 ? i + " AM" :
                            i === 12 ? "12 PM" :
                            (i - 12) + " PM";
                document.write(`<option value="${i}">${label}</option>`);
            }
        </script>
    </select>

    <label>Distance (miles)</label>
    <input id="distance" type="number" value="3" min="0" step="0.1" />

    <div class="button-row">
        <button class="estimate-btn" onclick="estimateRide()">Estimate</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <div class="result" id="result"></div>

</div>

<script>
function formatHour(h) {
    if (h === 0) return "12 AM";
    if (h < 12) return h + " AM";
    if (h === 12) return "12 PM";
    return (h - 12) + " PM";
}

async function estimateRide() {
    const day = document.getElementById("day").value;
    const hour = document.getElementById("hour").value;
    const distance = document.getElementById("distance").value;

    if (!distance || distance <= 0) {
        document.getElementById("result").innerHTML =
            `<div class="card"><b>Please enter a valid distance.</b></div>`;
        return;
    }

    // 🔥 FIXED BACKEND URL
    const response = await fetch(
        `https://delightful-croquembouche-9a6406.netlify.app/.netlify/functions/predict?day=${day}&hour=${hour}&distance=${distance}`
    );

    const data = await response.json();

    let bestHour = hour;
    let bestPrice = data.final_price;

    for (let h = Math.max(0, hour - 2); h <= Math.min(23, parseInt(hour) + 2); h++) {
        const test = await fetch(
            `https://delightful-croquembouche-9a6406.netlify.app/.netlify/functions/predict?day=${day}&hour=${h}&distance=${distance}`
        );
        const testData = await test.json();

        if (testData.final_price < bestPrice) {
            bestPrice = testData.final_price;
            bestHour = h;
        }
    }

    let tipHTML = "";
    if (bestHour != hour) {
        const savings = data.final_price - bestPrice;
        tipHTML = `
            <div class="card tip">
                💡 <b>Better Time:</b> ${formatHour(bestHour)}<br>
                <b>Save:</b> $${savings.toFixed(2)}
            </div>
        `;
    }

    document.getElementById("result").innerHTML = `
        <div class="card">💰 <b>Base Price:</b> $${data.base_price}</div>
        <div class="card">⚡ <b>Surge:</b> ${data.surge_multiplier}x</div>
        <div class="card">💵 <b>Final Price:</b> $${data.final_price}</div>
        <div class="card">📊 <b>Range:</b> $${data.low_estimate} – $${data.high_estimate}</div>
        <div class="card">📊 <b>Demand:</b> ${data.demand}</div>
        <div class="card">⏱ <b>Wait Time:</b> ${data.wait_time}</div>
        <div class="card">🚗 <b>Trip Time:</b> ${data.trip_time_minutes} min</div>
        ${tipHTML}
    `;
}

function resetForm() {
    document.getElementById("day").value = "0";
    document.getElementById("hour").value = "0";
    document.getElementById("distance").value = "3";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
